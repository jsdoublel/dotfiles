# kitty.conf

## Settings
 
### Font
font_family Go Mono 
font_size 11
# # Nerd Fonts v3.4.0
symbol_map U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono

### Cursor
cursor_trail 1
cursor_trail_decay 0.1 0.15

background_blur 1
background_opacity 0.8

### General Options
enable_audio_bell no
allow_remote_control yes

### Scrollback
scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'call nvim_open_term(0, {})' +'set nomodified nolist number relativenumber' +'$' -

pixel_scroll yes

### Keybinds
include keybinds.conf

### Layouts 
watcher dynamic_layout.py

### Themes
# BEGIN_KITTY_THEME
include current-theme.conf
# END_KITTY_THEME

